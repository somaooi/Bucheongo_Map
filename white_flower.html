        <h3>목련(학명: Magnolia kobus)은 우리나라와 일본이 원산지인 낙엽 활엽 교목입니다. 봄을 알리는 대표적인 꽃으로, 잎이 돋아나기 전인 3~4월에 가지 끝에서 커다란 흰색 꽃을 피웁니다. 꽃봉오리가 붓을 닮았다고 하여 '신이(辛夷)'라고도 부르며, 한방에서는 약재로 쓰이기도 합니다. 향기가 좋고 외관이 아름다워 정원수나 가로수로 널리 사랑받는 나무입니다.</h3>
