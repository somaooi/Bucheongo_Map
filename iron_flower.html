        <h3>영산홍(학명: Rhododendron indicum)은 아시아 원산의 진달래과 상록 또는 반상록 관목입니다. 4~5월 봄철에 가지 끝에서 붉은색, 분홍색, 흰색 등 화려하고 선명한 꽃을 무리 지어 피우는 것이 특징입니다. 철쭉과 비슷하게 생겼지만 겨울에도 잎이 완전히 떨어지지 않고 남아 있으며, 추위와 공해에 강해 도심의 공원, 아파트 화단, 도로변의 조경수로 매우 흔하게 쓰입니다.</h3>
